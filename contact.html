  <title>Contact | エイチテクノロジーズ株式会社</title>
  <meta name="description" content="エイチテクノロジーズ株式会社へのお問い合わせはこちらから。" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          screens: {
            xs: "480px"
          },
          fontFamily: {
            sans: ["Space Grotesk", "Noto Sans JP", "sans-serif"],
            display: ["Bebas Neue", "Space Grotesk", "sans-serif"]
          },
          colors: {
            base: "#050505",
            ink: "#f2f2f2"
          }
        }
      }
    };
  </script>

  <link rel="icon" type="image/png" sizes="512x512" href="img/h-logo-512x512.png" />
  <link rel="icon" type="image/png" href="img/h-logo-512x512.png" />
  <link rel="shortcut icon" href="img/h-logo-512x512.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;500;700;900&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="home.css" />
</head>
<body class="home-page contact-page antialiased">
  <header class="site-header">
    <a class="brand-link" href="index.html" aria-label="H Technologies ホーム">
      <img class="h-[17px] xs:h-[19px] md:h-[21px] lg:h-[24px] w-auto header-logo" src="img/h-technologies-logo.PNG" alt="エイチテクノロジーズ株式会社" />
    </a>

    <nav class="main-nav" aria-label="Main menu">
      <button class="menu-toggle" aria-label="Open menu" aria-expanded="false" aria-controls="nav-panel">
        <span></span>
      </button>
      <div class="nav-panel" id="nav-panel">
        <button class="menu-close" aria-label="Close menu"></button>
        <ul>
          <li><a href="index.html#top">Top</a></li>
          <li><a href="index.html#service">Service</a></li>
          <li><a href="index.html#company">Company</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </div>
    </nav>
  </header>

  <main>
    <section class="section contact-main !px-4 xs:!px-6 md:!px-10 lg:!px-16" id="top">
      <div class="section-head reveal max-w-[96vw] md:max-w-[88vw] lg:max-w-[76vw]">
        <p class="eyebrow">Contact</p>
        <h2 class="!text-[52px] xs:!text-[68px] md:!text-[92px] lg:!text-[120px]">お問い合わせ</h2>
      </div>
      <p class="contact-lead reveal delay-1 text-[14px] xs:text-[15px] md:text-[16px] lg:text-[17px] leading-[1.9]">
        ご質問・お見積りのご依頼など、お気軽にお問い合わせください。内容を確認のうえ、担当者よりご連絡いたします。
      </p>

      <form class="contact-form reveal delay-2 w-full md:w-[92%] lg:w-full" id="contact-form" action="https://formspree.io/f/mkgbeolg" method="POST">
        <label class="field !grid !grid-cols-1 md:!grid-cols-[minmax(120px,180px)_minmax(0,1fr)] !gap-2 xs:!gap-3 md:!gap-6">
          <span class="field-label text-[15px] xs:text-[16px] md:text-[18px]">Name</span>
          <input class="text-[14px] xs:text-[15px] md:text-[16px]" type="text" name="name" autocomplete="name" required />
        </label>
        <label class="field !grid !grid-cols-1 md:!grid-cols-[minmax(120px,180px)_minmax(0,1fr)] !gap-2 xs:!gap-3 md:!gap-6">
          <span class="field-label text-[15px] xs:text-[16px] md:text-[18px]">Email</span>
          <input class="text-[14px] xs:text-[15px] md:text-[16px]" type="email" name="email" autocomplete="email" required />
        </label>
        <label class="field !grid !grid-cols-1 md:!grid-cols-[minmax(120px,180px)_minmax(0,1fr)] !gap-2 xs:!gap-3 md:!gap-6">
          <span class="field-label text-[15px] xs:text-[16px] md:text-[18px]">Subject</span>
          <input class="text-[14px] xs:text-[15px] md:text-[16px]" type="text" name="subject" />
        </label>
        <label class="field !grid !grid-cols-1 md:!grid-cols-[minmax(120px,180px)_minmax(0,1fr)] !gap-2 xs:!gap-3 md:!gap-6">
          <span class="field-label text-[15px] xs:text-[16px] md:text-[18px]">Message</span>
          <textarea class="min-h-[160px] xs:min-h-[170px] md:min-h-[190px] text-[14px] xs:text-[15px] md:text-[16px]" name="message" required></textarea>
        </label>
        <button class="contact-submit !w-full xs:!w-auto text-[18px] xs:text-[20px] md:text-[24px]" type="submit">SEND MESSAGE</button>
      </form>
      <p id="form-result" class="form-result hidden">お問い合わせありがとうございます。追ってご連絡いたします。</p>
    </section>
  </main>

  <footer>
    <p>© 2026 H Technologies Inc.</p>
  </footer>

  <script src="app.js"></script>
  <script src="form.js"></script>
</body>
</html>
